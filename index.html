<style>

art;justify-content:space-between;gap:12px;margin-bottom:14px}.head h1,.head h2{margin:0}h1{font-size:34px;line-height:1.12}h2{font-size:24px}h3{font-size:17px;margin:0 0 10px}p{line-height:1.72;margin:0 0 10px}.muted{color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.three{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.two{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,.52fr);gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:left;box-shadow:0 5px 18px rgba(18,32,50,.035)}.card strong{display:block;font-size:17px;margin-bottom:8px}.badge,.chip,.tiny{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:26px;padding:4px 9px;border-radius:999px;background:#edf2f7;color:#475467;font-size:12px;font-weight:900}.chip{min-height:34px;font-size:14px;padding:7px 11px}.chip.active{background:var(--teal);color:#fff}.tiny{border-radius:var(--r);min-height:34px}.primary{background:var(--teal);color:white}.stage1{background:#eef6ff;color:#1d4e89}.stage2{background:#e7f7f6;color:#096466}.flow{display:grid;gap:9px}.step{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:var(--r);background:#f8fafc;padding:10px}.num{width:28px;height:28px;flex:0 0 28px;display:grid;place-items:center;border-radius:50%;background:var(--teal);color:white;font-weight:900}.mind{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.mind span{min-height:58px;display:grid;place-items:center;text-align:center;border:1px solid #cfe2ff;background:#eef6ff;border-radius:var(--r);font-weight:900;padding:10px}.mind span:nth-child(1),.mind span:nth-child(5){background:#e7f7f6;border-color:#bfe5e3}.tabs{display:flex;gap:8px;flex-wrap:wrap}.layout{display:grid;grid-template-columns:260px minmax(0,1fr);gap:16px}.menu{position:sticky;top:82px;border:1px solid var(--line);border-radius:var(--r);background:white;padding:10px}.menu button{display:block;width:100%;min-height:38px;text-align:left;padding:8px 10px;border-radius:var(--r);font-weight:900;color:#667085}.menu button.active{background:#e7f7f6;color:#096466}.table{overflow:auto;border:1px solid var(--line);border-radius:var(--r)}table{width:100%;border-collapse:collapse;background:white}th,td{padding:10px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:top;line-height:1.55}th{background:#eef4fb;text-align:left}.q{background:white;border:1px solid var(--line);border-radius:var(--r);padding:14px}.opt{display:block;width:100%;min-height:42px;margin-top:8px;border:1px solid var(--line);border-radius:var(--r);background:#f8fafc;padding:9px 11px;text-align:left}.opt.correct{background:#edfdf3;border-color:#49aa65}.opt.wrong{background:#fff1f0;border-color:#ff7875}.ans{margin-top:12px;padding:12px;border-left:4px solid var(--teal);background:#f8fafc}.svgbox{width:100%;min-height:330px;background:white;border:1px solid var(--line);border-radius:var(--r)}.speak{border-radius:var(--r);background:#eef4fb;padding:6px 9px;font-weight:900}.mobile{display:none}@media(max-width:1120px){.app{grid-template-columns:1fr}aside{position:fixed;z-index:20;inset:0 auto 0 0;width:294px;transform:translateX(-102%);transition:.2s}aside.open{transform:translateX(0)}.mobile{display:inline-flex}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.two,.layout{grid-template-columns:1fr}.menu{position:static}}@media(max-width:760px){main{padding:16px}.top{margin:-16px -16px 16px;padding:12px 16px;flex-wrap:wrap}.grid,.three,.mind{grid-template-columns:1fr}h1{font-size:28px}.state{width:100%}}

<body><div class="app"><aside id="aside"><div class="brand"><strong>Dental Exam Master OS</strong><span>最適合牙醫國考架構｜第一階打底、第二階解題、病例影像牙材整合。</span></div><div id="nav"></div></aside><main><div class="top"><button id="menu" class="tiny mobile">☰</button><label class="search">⌕<input id="search" placeholder="搜尋：科目、疾病、牙髓、牙周、補綴、口外、影像、牙材、英文縮寫"></label><div class="state">● 無 AI Token｜本機內容</div></div><section id="home" class="view active"></section><section id="roadmap" class="view"></section><section id="stage1" class="view"></section><section id="stage2" class="view"></section><section id="subject" class="view"></section><section id="cases" class="view"></section><section id="images" class="view"></section><section id="materials" class="view"></section><section id="english" class="view"></section><section id="wrong" class="view"></section></main></div>
<script>
const navs=[['home','首頁'],['roadmap','國考總架構'],['stage1','第一階精讀'],['stage2','第二階臨床'],['subject','科目節點庫'],['cases','病例決策庫'],['images','影像判讀庫'],['materials','牙材藥理庫'],['english','牙科英文'],['wrong','高槓桿錯題本']];
const s1=[['anatomy','口腔解剖胚胎組織','牙齒、牙周、顎骨、唾液腺、頭頸神經血管、牙胚發育','三叉神經,顏面神經,牙胚,琺瑯質,牙本質,牙髓,牙周膜,齒槽骨,唾液腺,TMJ'],['physio','口腔生理與基礎醫學','咀嚼、吞嚥、唾液、疼痛、骨代謝、凝血、免疫與傷口癒合','咬合,唾液緩衝,牙髓痛覺,骨重塑,凝血,發炎,免疫,神經傳導,傷口癒合,微循環'],['micro','口腔微生物免疫','biofilm、齲齒菌、牙周致病菌、抗生素與宿主免疫','biofilm,S. mutans,P. gingivalis,LPS,IgA,補體,中性球,菌斑成熟,抗生素,感染擴散'],['path','口腔病理與一般病理','發炎、囊腫、腫瘤、黏膜病變、顎骨病變與癌前變化','白斑,紅斑,SCC,根尖囊腫,含齒囊腫,OKC,成釉細胞瘤,骨髓炎,肉芽腫,壞死'],['pharm','牙科藥理與全身醫學','局麻、止痛、抗生素、抗凝血、鎮靜、內科病患牙科風險','lidocaine,epinephrine,NSAID,acetaminophen,amoxicillin,clindamycin,warfarin,DOAC,bisphosphonate,steroid'],['public','公共衛生倫理法規','預防牙醫、流病、感染控制、病歷、告知同意與法規','DMFT,fluoride,sealant,screening,sensitivity,specificity,consent,病歷,感染控制,職業暴露']];
const s2=[['rest','牙體復形','齲齒診斷、窩洞、黏著、樹脂、玻璃離子、橡皮障與失敗分析','caries,composite,GIC,bonding,etching,shrinkage,matrix,rubber dam,microleakage,secondary caries'],['endo','牙髓病與根管','牙髓診斷、根管長度、清創沖洗、充填、急症與再治療','pulpitis,EPT,cold test,working length,NaOCl,EDTA,gutta-percha,apical stop,flare-up,retreatment'],['perio','牙周病學','囊袋、附連喪失、分期分級、SRP、手術、植體周圍炎與維持','periodontitis,CAL,PPD,BOP,furcation,SRP,GTR,maintenance,implantitis,mobility'],['prostho','補綴學','固定補綴、活動義齒、全口義齒、植牙補綴、印模與咬合','crown,bridge,RPD,complete denture,impression,margin,occlusion,abutment,pontic,implant'],['surgery','口腔顎面外科','拔牙、阻生齒、感染空間、外傷、切片、顎骨疾病與術前評估','impaction,IAN,dry socket,space infection,I&D,biopsy,osteomyelitis,TMJ,anticoagulant,MRONJ'],['pedo','兒童牙科','乳牙齲齒、牙髓治療、空間維持、行為管理、外傷與預防','primary teeth,pulpotomy,SSC,space maintainer,sealant,fluoride,behavior,trauma,eruption,mixed dentition'],['ortho','齒顎矯正','生長發育、Angle分類、頭影測量、空間分析、錯咬與治療時機','Class I,Class II,Class III,crossbite,cephalometry,growth,crowding,anchorage,retention,open bite'],['diag','口腔診斷影像','根尖片、咬翼片、全景片、CBCT、黏膜病變、囊腫腫瘤鑑別','periapical,bitewing,panoramic,CBCT,radiolucency,radiopacity,PDL,lamina dura,SCC,biopsy']];
const subjects=[...s1.map(x=>mk(x,'第一階')),...s2.map(x=>mk(x,'第二階'))];function mk(x,stage){return{id:x[0],name:x[1],focus:x[2],core:x[3].split(','),stage}}
const diseases='齲齒,可逆性牙髓炎,不可逆性牙髓炎,牙髓壞死,急性根尖膿瘍,慢性根尖周炎,牙周炎,壞死性牙周病,牙齦炎,智齒冠周炎,乾性齒槽炎,口腔蜂窩性組織炎,白斑,紅斑,口腔鱗狀細胞癌,復發性阿弗他潰瘍,扁平苔癬,念珠菌感染,顎骨骨髓炎,根尖囊腫,含齒囊腫,OKC,成釉細胞瘤,TMJ疼痛障礙,MRONJ,乳牙齲齒,牙外傷,植體周圍炎,口腔扁平苔癬,唾液腺疾病'.split(',');
const mats='lidocaine,articaine,epinephrine,ibuprofen,acetaminophen,amoxicillin,metronidazole,clindamycin,chlorhexidine,fluoride varnish,composite resin,GIC,RMGIC,ZOE,calcium hydroxide,MTA,Biodentine,gutta-percha,NaOCl,EDTA,alginate,PVS,zirconia,lithium disilicate,titanium implant,bisphosphonate,warfarin,aspirin,DOAC,midazolam'.split(',');
const abbr={TMJ:'顳顎關節',TMD:'顳顎障礙',CBCT:'錐狀束電腦斷層',PDL:'牙周膜',IAN:'下齒槽神經',LA:'局部麻醉',NSAID:'非類固醇消炎止痛藥',GIC:'玻璃離子體水門汀',RMGIC:'樹脂改良玻璃離子體',RPD:'局部活動義齒',CAL:'臨床附連喪失',PPD:'牙周囊袋深度',BOP:'探診出血',SRP:'洗牙與牙根整平',EPT:'電活髓測試',NaOCl:'次氯酸鈉',EDTA:'乙二胺四乙酸',SCC:'鱗狀細胞癌',MRONJ:'藥物相關顎骨壞死',DOAC:'直接口服抗凝血劑',INR:'國際標準化凝血比值',DM:'糖尿病',HTN:'高血壓',IE:'感染性心內膜炎'};
let active='home', sid=subjects[0].id, page=0; const store=JSON.parse(localStorage.getItem('dental-master-os')||'{"wrong":[]}'); function save(){localStorage.setItem('dental-master-os',JSON.stringify(store))} function sub(){return subjects.find(x=>x.id===sid)||subjects[0]} function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function speak(w){if(!speechSynthesis)return; speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.82;speechSynthesis.speak(u)}
function nodes(s=sub(),n=150,type='核心'){return Array.from({length:n},(_,i)=>{let core=s.core[i%s.core.length],d=diseases[i%diseases.length],m=mats[i%mats.length];return{title:`${s.name}｜${type}節點 ${i+1}`,core,d,m,plain:`${core}在${s.focus}中是高槓桿考點，需連到口腔位置、病因、檢查證據與處置。`,map:`正常結構 → ${core}失衡 → ${d} → 檢查/影像 → ${m}或臨床處置 → 追蹤。`,trap:`常見陷阱是只背${core}名詞，沒有分牙髓/牙周/顎骨/黏膜/材料，也沒注意全身禁忌。`,tip:`背法：先定位，再說機制，再找證據，最後選下一步。`}})}
function qs(s=sub(),n=100){return Array.from({length:n},(_,i)=>{let core=s.core[i%s.core.length],d=diseases[(i+5)%diseases.length],m=mats[(i+9)%mats.length];return{stem:`${s.stage}${s.name}高槓桿題${i+1}：病人有${d}相關症狀，檢查線索指向${core}，下列何者最適合？`,opts:[`先定位組織與病因，再用檢查證據決定${m}或處置`,`只看疼痛程度，不需影像與病史`,`所有病例都先拔牙最安全`,`忽略藥物史與全身疾病`],why:`答案A。牙醫國考核心是「位置→機制→證據→診斷→處置→追蹤」，${core}必須放回${s.focus}。`,wrong:`錯誤選項都跳過定位、影像、全身病史或治療順序。`,avoid:`遇到題目先寫五格：牙髓/牙周/顎骨/黏膜/材料、急慢性、檢查證據、禁忌、下一步。`,rel:`${d}｜${m}｜${core}`}})}
function navTo(id){active=id;document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id)); if(innerWidth<1120)aside.classList.remove('open')}
function renderNav(){nav.innerHTML='<div class="nav-title">最適合牙醫國考架構</div>'+navs.map(n=>`<button data-id="${n[0]}" class="nav-btn ${n[0]==='home'?'active':''}" onclick="navTo('${n[0]}')"><span>${ico(n[0])}</span>${n[1]}</button>`).join('')} function ico(x){return{home:'⌂',roadmap:'◎',stage1:'Ⅰ',stage2:'Ⅱ',subject:'▤',cases:'?',images:'▣',materials:'◈',english:'A',wrong:'!'}[x]}
function toothSvg(){return `<svg class="svgbox" viewBox="0 0 820 360"><rect width="820" height="360" fill="#fff"/><g transform="translate(58,28)"><path d="M112 20C70 25 58 70 70 112C82 156 95 206 96 270C96 310 132 316 147 283C162 247 168 208 185 208C202 208 208 247 224 283C239 316 275 310 276 270C277 206 289 156 301 112C313 70 301 25 258 20C226 17 207 36 185 36C164 36 144 17 112 20Z" fill="#f7fbff" stroke="#172033" stroke-width="5"/><circle cx="185" cy="114" r="34" fill="#e7f7f6" stroke="#0f8b8d" stroke-width="4"/><text x="185" y="120" text-anchor="middle" font-weight="900">牙髓</text><path d="M110 63C154 90 216 90 260 63" fill="none" stroke="#b7791f" stroke-width="6"/><text x="185" y="58" text-anchor="middle" font-weight="900">硬組織</text><path d="M89 235C128 210 152 198 185 198C218 198 242 210 281 235" fill="none" stroke="#16803c" stroke-width="7"/><text x="185" y="240" text-anchor="middle" font-weight="900">牙周/骨</text></g><g transform="translate(410,44)" font-size="18"><text x="0" y="0" font-size="24" font-weight="900">牙醫國考最佳解題路徑</text>${['主訴：痛、腫、出血、白斑、影像異常','定位：牙髓/牙周/顎骨/黏膜/咬合/材料','證據：X光、CBCT、EPT、PPD、BOP、切片','診斷：先分類再命名','處置：急症、禁忌、材料/藥物、追蹤','錯題：錯誤模型→正確模型'].map((x,i)=>`<rect x="0" y="${28+i*42}" width="355" height="31" rx="6" fill="${i%2?'#eef6ff':'#e7f7f6'}" stroke="#cfe2ff"/><text x="12" y="${50+i*42}" font-weight="800">${i+1}. ${x}</text>`).join('')}</g></svg>`}
function chips(){return `<div class="tabs">${subjects.map(s=>`<button class="chip ${s.id===sid?'active':''}" onclick="sid='${s.id}';page=0;renderSubject();renderCases();renderWrong();renderMaterials();renderImages();">${s.name}</button>`).join('')}</div>`}
function metric(t,n,b,go){return `<button class="card" onclick="${go}"><strong>${t}</strong><p class="muted">${b}</p><div><span class="badge">${n}節點</span></div></button>`}
function renderHome(){home.innerHTML=`<div class="section"><div class="head"><div><h1>Dental Exam Master OS</h1><p class="muted">按照最適合牙醫國考的架構：第一階建立基礎與口腔模型，第二階練臨床診斷、影像、材料、處置與病例決策。</p></div><span class="badge">獨立新版 APP</span></div><div class="two"><div>${toothSvg()}</div><div class="flow">${['先分第一階/第二階，不混讀','每科固定：一句話、目標、心智圖、流程、因果、疾病、牙材藥理、影像、英文、錯題','所有題目直接給答案與錯誤模型','用牙髓/牙周/顎骨/黏膜/咬合/材料六大定位解題','英文縮寫全部中文解析，單字可發音'].map((x,i)=>`<div class="step"><span class="num">${i+1}</span><strong>${x}</strong></div>`).join('')}</div></div></div><div class="grid">${metric('第一階精讀',s1.length*150,'基礎醫學、口腔解剖生理、微免、病理、藥理、公衛倫理。',"navTo('stage1')")}${metric('第二階臨床',s2.length*150,'復形、根管、牙周、補綴、口外、兒牙、矯正、影像診斷。',"navTo('stage2')")}${metric('病例決策庫',300,'300個牙醫病例，直接答案與九步推理。',"navTo('cases')")}${metric('高槓桿錯題本',subjects.length*100,'每科100題，直接答案、錯誤模型、避免方法。',"navTo('wrong')")}</div>`}
function renderRoadmap(){roadmap.innerHTML=`<div class="section"><div class="head"><h2>牙醫國考總架構</h2><span class="badge">最適合讀法</span></div><div class="three"><div class="card"><strong>第一階</strong><p>以基礎醫學＋口腔基礎為主，目標是理解正常與失衡。</p><div class="flow">${s1.map((x,i)=>`<div class="step"><span class="num">${i+1}</span>${x[1]}</div>`).join('')}</div></div><div class="card"><strong>第二階</strong><p>以臨床牙科處置為主，目標是會診斷、會選檢查、會下一步。</p><div class="flow">${s2.map((x,i)=>`<div class="step"><span class="num">${i+1}</span>${x[1]}</div>`).join('')}</div></div><div class="card"><strong>六大定位</strong><div class="mind">${['牙髓','牙周','顎骨','黏膜','咬合/TMJ','牙材/補綴'].map(x=>`<span>${x}</span>`).join('')}</div></div></div></div>`}
function renderStage(which){let arr=which===1?subjects.filter(s=>s.stage==='第一階'):subjects.filter(s=>s.stage==='第二階'), el=which===1?stage1:stage2; el.innerHTML=`<div class="section"><div class="head"><h2>牙醫${which===1?'第一階':'第二階'}國考</h2><span class="badge">每科150內容節點＋100題</span></div><div class="grid">${arr.map(s=>`<button class="card" onclick="sid='${s.id}';page=0;renderSubject();navTo('subject')"><span class="badge ${which===1?'stage1':'stage2'}">${s.stage}</span><strong>${s.name}</strong><p>${s.focus}</p><div class="tabs">${s.core.slice(0,5).map(c=>`<span class="badge">${c}</span>`).join('')}</div></button>`).join('')}</div></div>`}
const pages=['一句話理解','本章目標','六大定位圖','核心心智圖','診斷流程','因果圖','疾病節點','牙材藥理','影像判讀','英文縮寫','國考重點','錯題解析','一頁總整理'];
function pageHtml(s,i){let ns=nodes(s,36), rows=[['牙髓','冷熱痛、夜間痛、叩痛','EPT/cold test/根尖片','可逆或不可逆，是否根管'],['牙周','囊袋、BOP、鬆動、骨喪失','PPD/CAL/X光','慢性病程與維持'],['顎骨','影像透亮或不透亮、膨隆','全景/CBCT/切片','囊腫腫瘤鑑別'],['黏膜','白斑紅斑潰瘍硬結','視診觸診切片','癌前與SCC警訊'],['材料','邊緣滲漏、二次齲、破裂','臨床檢查/X光','材料性質與操作失敗']];let render=[()=>`<h2>${s.name}</h2><p style="font-size:21px;font-weight:900">${s.focus}。本章要把名詞變成臨床定位與國考解題路線。</p><div class="mind">${s.core.slice(0,9).map(x=>`<span>${x}</span>`).join('')}</div>`,()=>`<h2>本章目標</h2><div class="flow">${['知道正常結構與功能','說出病因與失衡機制','讀懂影像與檢查線索','能做鑑別診斷','知道材料/藥物/處置禁忌','能把錯題改成正確模型'].map((x,k)=>`<div class="step"><span class="num">${k+1}</span>${x}</div>`).join('')}</div>`,()=>`<h2>六大定位圖</h2>${toothSvg()}`,()=>`<h2>核心心智圖</h2><div class="mind">${s.core.map(x=>`<span>${x}</span>`).join('')}</div>`,()=>`<h2>診斷流程</h2><div class="flow">${['主訴','病史與全身用藥','口內外檢查','影像/活髓/牙周/切片','六大定位','鑑別診斷','治療計畫','追蹤維持'].map((x,k)=>`<div class="step"><span class="num">${k+1}</span>${x}</div>`).join('')}</div>`,()=>`<h2>因果圖</h2><div class="flow">${ns.slice(0,8).map((n,k)=>`<div class="step"><span class="num">${k+1}</span>${n.map}</div>`).join('')}</div>`,()=>cards(ns,'疾病'),()=>cards(nodes(s,36,'牙材藥理'),'牙材藥理'),()=>imageCards(45),()=>englishBlock(),()=>`<h2>國考重點</h2><div class="flow">${ns.slice(0,12).map((n,k)=>`<div class="step"><span class="num">${k+1}</span><div><strong>${n.title}</strong><br>${n.plain}<br><span class="muted">${n.trap}</span></div></div>`).join('')}</div>`,()=>questionBlock(s,qs(s,20)),()=>`<h2>一頁總整理</h2><div class="two"><div><h3>心智圖</h3><div class="mind">${s.core.map(x=>`<span>${x}</span>`).join('')}</div><h3 style="margin-top:16px">背誦秘訣</h3><div class="flow">${ns.slice(0,7).map((n,k)=>`<div class="step"><span class="num">${k+1}</span>${n.tip}</div>`).join('')}</div></div><div><h3>差異性表格</h3>${table(rows,['定位','典型線索','檢查','國考判斷'])}</div></div>`];return render[i]()}
function cards(ns,title){return `<h2>${title}節點</h2><div class="grid">${ns.map(n=>`<div class="card"><strong>${n.title}</strong><p><b>核心：</b>${n.plain}</p><p><b>心智圖：</b>${n.map}</p><p><b>陷阱：</b>${n.trap}</p><p><b>秘訣：</b>${n.tip}</p></div>`).join('')}</div>`}
function table(rows,heads){return `<div class="table"><table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function renderSubject(){let s=sub();subject.innerHTML=`<div class="section"><div class="head"><div><h2>${s.stage}｜${s.name}</h2><p class="muted">${s.focus}</p></div><span class="badge">固定13頁模板</span></div>${chips()}<div class="layout" style="margin-top:16px"><div class="menu">${pages.map((p,i)=>`<button class="${i===page?'active':''}" onclick="page=${i};renderSubject()">${i+1}. ${p}</button>`).join('')}</div><div class="section" style="margin-top:0">${pageHtml(s,page)}</div></div></div>`}
function questionBlock(s,arr){return `<div class="flow">${arr.map((q,idx)=>`<div class="q"><span class="badge">${s.stage}</span><h3>${q.stem}</h3>${q.opts.map((o,i)=>`<button class="opt" onclick="ans('${s.id}',${idx},${i},this)">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}<div class="ans"><p><b>直接答案：</b>A. ${q.opts[0]}</p><p><b>為什麼：</b>${q.why}</p><p><b>錯在哪：</b>${q.wrong}</p><p><b>如何避免：</b>${q.avoid}</p><p><b>相關：</b>${q.rel}</p></div></div>`).join('')}</div>`}
function ans(id,idx,i,el){let s=subjects.find(x=>x.id===id), q=qs(s,100)[idx]; el.parentElement.querySelectorAll('.opt').forEach((b,k)=>{b.classList.toggle('correct',k===0);b.classList.toggle('wrong',k===i&&i!==0)});if(i!==0){store.wrong.push({sub:s.name,stem:q.stem,correct:q.why,avoid:q.avoid});save();renderWrong()}}
function renderCases(){let arr=Array.from({length:300},(_,i)=>{let d=diseases[i%diseases.length],s=subjects[i%subjects.length],c=s.core[i%s.core.length];return{t:`病例${i+1}｜${d}｜${s.name}`,body:`主訴牙痛/腫脹/出血/白斑/影像異常，線索包含${c}與${d}。`,ans:['位置：牙髓、牙周、顎骨、黏膜、咬合或材料。','功能：疼痛、感染控制、咀嚼、支持、美觀或全身風險。','正常：回到正常牙齒、牙周、顎骨與黏膜。','失衡：微生物、外傷、材料失敗、免疫或全身疾病。','症狀：痛、腫、出血、鬆動、張口受限或白斑。','檢查：X光、CBCT、EPT、PPD、BOP、切片。','診斷：先分類再命名，排除相似疾病。','治療：急症優先，注意藥物與全身禁忌。','追蹤：症狀、功能、影像癒合與維持治療。']}});cases.innerHTML=`<div class="section"><div class="head"><h2>病例決策庫｜300例</h2><span class="badge">直接答案</span></div><div class="grid">${arr.map(c=>`<div class="card"><strong>${c.t}</strong><p>${c.body}</p><div class="flow">${c.ans.slice(0,3).map((a,i)=>`<div class="step"><span class="num">${i+1}</span>${a}</div>`).join('')}</div><details><summary class="tiny">完整九步答案</summary><div class="flow" style="margin-top:10px">${c.ans.map((a,i)=>`<div class="step"><span class="num">${i+1}</span>${a}</div>`).join('')}</div></details></div>`).join('')}</div></div>`}
function imageCards(n=120){let imgs='bitewing齲齒,periapical根尖片,panoramic全景片,CBCT三維影像,PDL widening牙周膜變寬,lamina dura消失,periapical radiolucency根尖透亮,horizontal bone loss水平骨喪失,vertical bone loss垂直骨喪失,furcation根分叉,impacted third molar阻生智齒,multilocular radiolucency多房性透亮,radiopaque lesion不透亮病灶,root resorption牙根吸收'.split(',');return `<h2>影像判讀節點</h2><div class="grid">${Array.from({length:n},(_,i)=>{let x=imgs[i%imgs.length];return`<div class="card"><strong>${x}｜${i+1}</strong><p><b>看圖順序：</b>位置→邊界→密度→牙根→PDL（牙周膜）→骨板→臨床症狀。</p><p><b>國考陷阱：</b>影像不能單獨診斷，要連主訴、活髓、牙周探測與病史。</p></div>`}).join('')}</div>`}
function renderImages(){images.innerHTML=`<div class="section"><div class="head"><h2>影像判讀庫</h2><span class="badge">120節點</span></div>${imageCards(120)}</div>`}
function renderMaterials(){materials.innerHTML=`<div class="section"><div class="head"><h2>牙材藥理庫</h2><span class="badge">150節點</span></div>${cards(nodes(sub(),150,'牙材藥理'),'牙材藥理')}</div>`}
function englishBlock(){let words=['occlusion 咬合','periodontitis 牙周炎','pulpitis 牙髓炎','caries 齲齒','composite resin 複合樹脂','impression 印模','endodontics 牙髓病學','prosthodontics 補綴學','orthodontics 齒顎矯正學','radiolucency 放射線透亮','radiopacity 放射線不透亮','periapical 根尖周圍','furcation 根分叉','biopsy 切片檢查','alveolar bone 齒槽骨','lamina dura 硬骨板','pulpotomy 牙髓切斷術','apicoectomy 根尖切除術','debridement 清創','osseointegration 骨整合'];let roots=['peri- 周圍','endo- 內部','ortho- 正/直','odont- 牙','stomat- 口腔','gingiv- 牙齦','apic- 根尖','osteo- 骨','myo- 肌肉','neuro- 神經','itis 發炎','ectomy 切除','plasty 修補','algia 疼痛'];return `<h2>牙科英文</h2><div class="three"><div class="card"><strong>字根字首</strong>${roots.map(x=>`<p>${x}</p>`).join('')}</div><div class="card"><strong>單字發音</strong>${words.map(w=>{let en=w.split(' ').slice(0,w.includes(' ')?2:1).join(' ').replace(/[\u4e00-\u9fff].*/,'').trim();return`<p><button class="speak" onclick="speak('${en}')">▶</button> ${w}</p>`}).join('')}</div><div class="card"><strong>縮寫中文解析</strong>${Object.entries(abbr).map(([k,v])=>`<p><b>${k}</b>：${v}</p>`).join('')}</div></div>`}
function renderEnglish(){english.innerHTML=`<div class="section">${englishBlock()}</div>`}
function renderWrong(){wrong.innerHTML=`<div class="section"><div class="head"><h2>高槓桿錯題本｜每科100題</h2><span class="badge">${sub().name}</span></div>${chips()}<div style="margin-top:16px">${questionBlock(sub(),qs(sub(),100))}</div></div>`}
function renderSearch(t){let hits=[...subjects.map(s=>({t:s.name,b:s.focus,go:`sid='${s.id}';page=0;renderSubject();navTo('subject')`})),...diseases.map(d=>({t:d,b:'疾病節點',go:`navTo('subject')`})),...mats.map(m=>({t:m,b:'牙材藥理',go:`navTo('materials')`})),...Object.entries(abbr).map(([k,v])=>({t:k,b:v,go:`navTo('english')`}))].filter(x=>(x.t+x.b).toLowerCase().includes(t));home.innerHTML=`<div class="section"><div class="head"><h2>搜尋結果</h2><span class="badge">${hits.length}筆</span></div><div class="grid">${hits.map(h=>`<button class="card" onclick="${h.go}"><strong>${h.t}</strong><p>${h.b}</p></button>`).join('')||'<div class="card">找不到結果</div>'}</div></div>`;navTo('home')}
menu.onclick=()=>aside.classList.toggle('open');search.oninput=e=>{let t=e.target.value.trim().toLowerCase(); if(!t){renderHome();navTo('home')}else renderSearch(t)};
renderNav();renderHome();renderRoadmap();renderStage(1);renderStage(2);renderSubject();renderCases();renderImages();renderMaterials();renderEnglish();renderWrong();
</script><style id="dental-rich-template-style">
.diagram-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.diagram{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:14px}.diagram svg{width:100%;min-height:240px}.mini-title{font-weight:900;margin-bottom:8px}.memory-strip{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.memory-strip span{display:grid;place-items:center;min-height:48px;border-radius:var(--r);background:#fff7e6;border:1px solid #f4d59b;text-align:center;font-weight:900;padding:8px}.node-list{columns:2;column-gap:18px}.node-list p{break-inside:avoid;border-left:3px solid var(--teal);padding-left:8px;background:#f8fafc}.dense-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.dense-card{border:1px solid var(--line);border-radius:var(--r);background:#fff;padding:12px}.dense-card strong{display:block;margin-bottom:6px}.print-band{background:#102033;color:#eef6ff;border-radius:var(--r);padding:14px}.print-band .badge{background:rgba(255,255,255,.14);color:#fff}.compare-highlight{background:#e7f7f6;font-weight:900}@media(max-width:900px){.diagram-grid,.dense-grid{grid-template-columns:1fr}.memory-strip{grid-template-columns:1fr}.node-list{columns:1}}
</style>
<script id="dental-rich-template-script">
function dentalVisual(title, labels){const items=labels.slice(0,8);const colors=['#e7f7f6','#eef6ff','#fff7e6','#f8fafc'];return `<div class="diagram"><div class="mini-title">${title}</div><svg viewBox="0 0 720 300"><defs><marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8da2bb"/></marker></defs><circle cx="360" cy="150" r="58" fill="#102033"/><text x="360" y="145" text-anchor="middle" fill="white" font-weight="900" font-size="22">${title}</text><text x="360" y="170" text-anchor="middle" fill="#bfe5e3" font-size="14">國考核心</text>${items.map((x,i)=>{const a=-Math.PI/2+i*Math.PI*2/items.length,rx=250*Math.cos(a)+360,ry=112*Math.sin(a)+150;return `<line x1="360" y1="150" x2="${rx}" y2="${ry}" stroke="#8da2bb" stroke-width="2" marker-end="url(#arr2)"/><rect x="${rx-76}" y="${ry-24}" width="152" height="48" rx="8" fill="${colors[i%colors.length]}" stroke="#cfe2ff"/><text x="${rx}" y="${ry+5}" text-anchor="middle" font-weight="900" font-size="15">${x}</text>`}).join('')}</svg></div>`}
function sixLocationSvg(){return `<div class="diagram"><div class="mini-title">六大定位圖：先定位再診斷</div><svg viewBox="0 0 760 420"><rect width="760" height="420" fill="#fff"/><g transform="translate(50,38)"><path d="M125 15C73 23 60 79 76 130C92 185 102 236 104 312C105 356 148 365 166 326C184 284 189 240 210 240C231 240 236 284 254 326C272 365 315 356 316 312C318 236 328 185 344 130C360 79 347 23 295 15C258 10 235 34 210 35C185 34 162 10 125 15Z" fill="#f7fbff" stroke="#172033" stroke-width="5"/><path d="M125 60C172 88 246 88 295 60" fill="none" stroke="#b7791f" stroke-width="8"/><circle cx="210" cy="136" r="43" fill="#e7f7f6" stroke="#0f8b8d" stroke-width="5"/><path d="M107 272C155 238 183 225 210 225C237 225 265 238 313 272" fill="none" stroke="#16803c" stroke-width="9"/><text x="210" y="66" text-anchor="middle" font-weight="900">牙材/硬組織</text><text x="210" y="142" text-anchor="middle" font-weight="900">牙髓</text><text x="210" y="280" text-anchor="middle" font-weight="900">牙周/顎骨</text></g><g transform="translate(430,52)">${['牙髓：冷熱痛、夜間痛、EPT','牙周：PPD、BOP、CAL、骨喪失','顎骨：囊腫、腫瘤、骨髓炎、MRONJ','黏膜：白斑、紅斑、潰瘍、SCC','咬合/TMJ：彈響、張口受限、肌痛','牙材/補綴：滲漏、破裂、二次齲'].map((x,i)=>`<rect x="0" y="${i*54}" width="286" height="38" rx="8" fill="${i%2?'#eef6ff':'#e7f7f6'}" stroke="#cfe2ff"/><text x="14" y="${25+i*54}" font-size="16" font-weight="900">${x}</text>`).join('')}</g></svg></div>`}
function flowSvg(title, steps){return `<div class="diagram"><div class="mini-title">${title}</div><svg viewBox="0 0 860 260"><defs><marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8da2bb"/></marker></defs>${steps.slice(0,8).map((x,i)=>{const col=i%4,row=Math.floor(i/4),xx=28+col*205,yy=38+row*105;return `<rect x="${xx}" y="${yy}" width="160" height="58" rx="8" fill="${i%2?'#eef6ff':'#e7f7f6'}" stroke="#cfe2ff"/><circle cx="${xx+20}" cy="${yy+29}" r="15" fill="#0f8b8d"/><text x="${xx+20}" y="${yy+35}" text-anchor="middle" fill="white" font-weight="900">${i+1}</text><text x="${xx+45}" y="${yy+25}" font-size="15" font-weight="900">${x}</text>${i<steps.length-1&&i!==3?`<line x1="${xx+160}" y1="${yy+29}" x2="${xx+200}" y2="${yy+29}" stroke="#8da2bb" stroke-width="3" marker-end="url(#arr3)"/>`:''}`}).join('')}<path d="M795 67 C830 100 830 120 795 142" fill="none" stroke="#8da2bb" stroke-width="3" marker-end="url(#arr3)"/></svg></div>`}
function richTable(rows,heads){return `<div class="table"><table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map((r,ri)=>`<tr>${r.map((c,ci)=>`<td class="${ri===0&&ci===0?'compare-highlight':''}">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function memoryBlock(items){return `<div class="memory-strip">${items.map(x=>`<span>${x}</span>`).join('')}</div>`}
function richDiseaseAtlas(s,n=90){const ns=nodes(s,n,'疾病');return `<h2>疾病節點：心智圖＋鑑別＋運用</h2>${dentalVisual('疾病推理',['正常','病因','機制','症狀','檢查','診斷','治療','追蹤'])}<div class="dense-grid" style="margin-top:14px">${ns.map((n,i)=>`<div class="dense-card"><strong>${i+1}. ${n.d}</strong><p><b>定位：</b>${['牙髓','牙周','顎骨','黏膜','咬合/TMJ','牙材'][i%6]}。</p><p><b>核心內容：</b>${n.map}</p><p><b>鑑別：</b>急慢性、可逆不可逆、感染/腫瘤/材料失敗。</p><p><b>好背：</b>${n.tip}</p></div>`).join('')}</div>`}
function richMaterialAtlas(s,n=90){const ns=nodes(s,n,'牙材藥理');return `<h2>牙材藥理：用途、失敗、禁忌一起背</h2>${dentalVisual('牙材藥理',['用途','機制','操作','失敗','禁忌','副作用','替代','考點'])}<div class="dense-grid" style="margin-top:14px">${ns.map((n,i)=>`<div class="dense-card"><strong>${i+1}. ${n.m}</strong><p><b>用途：</b>連到${n.core}與${n.d}的臨床情境。</p><p><b>失敗原因：</b>水分控制、邊緣滲漏、聚合收縮、咬合負荷或全身禁忌。</p><p><b>國考陷阱：</b>${n.trap}</p></div>`).join('')}</div>`}
function richImageAtlas(n=90){const imgs='bitewing齲齒,periapical根尖片,panoramic全景片,CBCT錐狀束電腦斷層,PDL widening牙周膜變寬,lamina dura硬骨板消失,periapical radiolucency根尖透亮,horizontal bone loss水平骨喪失,vertical bone loss垂直骨喪失,furcation根分叉,impacted third molar阻生智齒,multilocular radiolucency多房性透亮,radiopaque lesion不透亮病灶,root resorption牙根吸收,calcified canal鈣化根管'.split(',');return `<h2>影像判讀：圖像線索轉診斷</h2>${flowSvg('影像判讀流程',['位置','邊界','密度','牙根','PDL','骨板','症狀','診斷'])}<div class="dense-grid" style="margin-top:14px">${Array.from({length:n},(_,i)=>{let x=imgs[i%imgs.length];return`<div class="dense-card"><strong>${i+1}. ${x}</strong><p><b>看圖：</b>位置→邊界→密度→牙根→PDL（牙周膜）→lamina dura（硬骨板）。</p><p><b>運用：</b>影像必須合併主訴、活髓測試、牙周探測與病史。</p><p><b>陷阱：</b>透亮不等於囊腫，不透亮不等於良性。</p></div>`}).join('')}</div>`}
function richEnglish(){const words=['occlusion 咬合','periodontitis 牙周炎','pulpitis 牙髓炎','caries 齲齒','composite resin 複合樹脂','impression 印模','endodontics 牙髓病學','prosthodontics 補綴學','orthodontics 齒顎矯正學','radiolucency 放射線透亮','radiopacity 放射線不透亮','periapical 根尖周圍','furcation 根分叉','biopsy 切片檢查','alveolar bone 齒槽骨','lamina dura 硬骨板','pulpotomy 牙髓切斷術','apicoectomy 根尖切除術','debridement 清創','osseointegration 骨整合'];const roots=['peri- 周圍','endo- 內部','ortho- 正/直','odont- 牙','stomat- 口腔','gingiv- 牙齦','apic- 根尖','osteo- 骨','myo- 肌肉','neuro- 神經','itis 發炎','ectomy 切除'];return `<h2>英文縮寫：雙語、字根、發音、臨床句</h2><div class="three"><div class="card"><strong>字根字首</strong>${roots.map(r=>`<p>${r}</p>`).join('')}</div><div class="card"><strong>單字發音</strong>${words.map(w=>{let en=w.replace(/[\u4e00-\u9fff].*/,'').trim();return`<p><button class="speak" onclick="speak('${en.replace(/'/g,'')}')">▶</button> ${w}</p>`}).join('')}</div><div class="card"><strong>縮寫中文解析</strong>${Object.entries(abbr).map(([k,v])=>`<p><b>${k}</b>：${v}</p>`).join('')}</div></div><div class="section"><h3>連鎖記憶</h3>${memoryBlock(['endo內部→根管','peri周圍→根尖/牙周','radio影像→黑白密度','osteo骨→骨整合/壞死','ectomy切除→外科術式'])}</div>`}
function questionRich(s,n=100){return `<h2>錯題解析：直接答案＋錯誤模型</h2>${questionBlock(s,qs(s,n))}`}
pageHtml=function(s,i){const ns=nodes(s,60);const rows=[['牙髓','冷熱痛、夜間痛、叩痛','EPT/cold test/根尖片','可逆或不可逆，是否根管','不要把所有牙痛都當牙周'],['牙周','囊袋、BOP、CAL、鬆動、骨喪失','PPD/CAL/BOP/X光','慢性病程、分期分級與維持','不要只看牙齦紅腫'],['顎骨','膨隆、透亮/不透亮、感覺異常','全景/CBCT/切片','囊腫、腫瘤、骨髓炎、MRONJ','不要只憑影像下診斷'],['黏膜','白斑、紅斑、潰瘍、硬結','視診、觸診、切片','癌前病變與SCC警訊','紅斑比白斑更危險'],['咬合/TMJ','彈響、張口受限、肌痛、磨耗','觸診、開口量、關節聲、影像','肌肉、關節盤、退化、咬合習慣','不要先做不可逆咬合調整'],['牙材/補綴','邊緣滲漏、破裂、脫落、二次齲','臨床檢查、X光、咬合紙','材料性質、操作、咬合、設計','不要只怪材料本身']];const goals=['建立六大定位反射','把正常結構連到病因','用檢查證據支持診斷','知道下一步處置與禁忌','能用表格鑑別相似疾病','把錯題改成正確模型'];const render=[()=>`<h2>一句話理解</h2><div class="print-band"><h3>${s.name}</h3><p>${s.focus}。最短解題句：先用六大定位找病灶，再用證據決定診斷與下一步。</p><div class="tabs">${s.core.map(x=>`<span class="badge">${x}</span>`).join('')}</div></div><div class="diagram-grid" style="margin-top:14px">${dentalVisual('一句話模型',['定位','功能','病因','機制','檢查','診斷','處置','追蹤'])}${flowSvg('最好背順序',['看主訴','問病史','六大定位','找證據','做鑑別','選處置','避禁忌','安排追蹤'])}</div><h3 style="margin-top:14px">背誦口訣</h3>${memoryBlock(['痛先牙髓','腫先感染','出血看牙周','白紅看黏膜','黑白看影像'])}`,()=>`<h2>本章目標</h2><div class="diagram-grid">${dentalVisual('學習目標',goals)}${flowSvg('能力養成',['知道','畫圖','比較','病例','解題','錯題','複述','臨床運用'])}</div><div class="dense-grid" style="margin-top:14px">${goals.map((g,k)=>`<div class="dense-card"><strong>${k+1}. ${g}</strong><p>今天要能把${s.core[k%s.core.length]}說成位置、機制、證據、處置四句話。</p><p class="muted">驗收：不看講義畫出一張流程圖。</p></div>`).join('')}</div>`,()=>`<h2>六大定位圖</h2><div class="diagram-grid">${sixLocationSvg()}${dentalVisual('定位線索',['牙髓痛','牙周囊袋','顎骨影像','黏膜病灶','TMJ功能','材料失敗'])}</div><h3 style="margin-top:14px">六大定位差異表</h3>${richTable(rows,['定位','典型線索','檢查','國考判斷','陷阱'])}`,()=>`<h2>核心心智圖</h2><div class="diagram-grid">${dentalVisual(s.name,s.core)}${dentalVisual('考點連結',['結構','功能','微生物','病理','藥理','材料','影像','處置'])}</div><div class="node-list" style="margin-top:14px">${ns.slice(0,30).map(n=>`<p><b>${n.core}</b>：${n.map}</p>`).join('')}</div>`,()=>`<h2>診斷流程</h2><div class="diagram-grid">${flowSvg('標準診斷流程',['主訴','病史','口 if(typeof renderSubject==='function')renderSubject();if(typeof renderImages==='function')renderImages();if(typeof renderMaterials==='function')renderMaterials();if(typeof renderWrong==='function')renderWrong();

function stage2NodeDetail(s,n,i){const clinical=['主訴判讀','臨床檢查','影像判讀','鑑別診斷','治療計畫','材料選擇','全身禁忌','術後追蹤'][i%8];const next=['急症處置','保守治療','根管治療','牙周治療','補綴設計','外科處置','切片/轉診','維持治療'][i%8];return `<div class="stage2-node"><strong>${i+1}. ${n.core}</strong><p><b>臨床定位：</b>${clinical}；第二階先問「下一步是什麼」。</p><p><b>病例線索：</b>${n.plain}</p><p><b>診斷機制：</b>${n.map}</p><p><b>必要檢查：</b>口內外檢查、X光/CBCT、EPT、PPD、BOP、咬合檢查、藥物史、切片。</p><p><b>處置選擇：</b>${next}，並確認疼痛、感染、功能、美觀與全身風險。</p><p><b>國考陷阱：</b>${n.trap}</p><p><b>背法：</b>主訴→定位→證據→診斷→禁忌→處置→追蹤。</p></div>`}
function stage2QuestionDetail(s,q,i){return `<div class="stage2-question"><span class="badge stage2">${s.name}｜第${i+1}題</span><h4>${q.stem}</h4><p>A. ${q.opts[0]}</p><p>B. ${q.opts[1]}</p><p>C. ${q.opts[2]}</p><p>D. ${q.opts[3]}</p><div class="stage2-answer"><b>直接答案：</b>A<br><b>為什麼：</b>${q.why}<br><b>錯在哪：</b>${q.wrong}<br><b>如何避免：</b>${q.avoid}<br><b>臨床下一步：</b>先處理急症與禁忌，再選擇可逆、保守、可追蹤的處置。<br><b>相關節點：</b>${q.rel}</div></div>`}
function stage2SubjectDetailed(s){const ns=nodes(s,150,'第二階臨床內容');const qlist=qs(s,100);const rows=[['復形/牙材','齲齒、二次齲、邊緣滲漏、破裂','咬翼片、橡皮障、黏著程序、咬合檢查','材料性質＋操作控制＋失敗原因'],['牙髓/根管','冷熱痛、夜間痛、叩痛、根尖透亮','EPT、cold test、根尖片、工作長度','可逆/不可逆、根管清創與充填'],['牙周','PPD、BOP、CAL、鬆動、骨喪失','牙周 chart、X光、風險因子','分期分級、SRP、手術與維持'],['補綴','缺牙、支台、咬合、邊緣、印模','咬合分析、支台評估、材料選擇','設計錯誤、邊緣不合、受力問題'],['口外','阻生齒、感染、外傷、囊腫腫瘤','全景、CBCT、神經位置、切片','先急症、避開抗凝血與MRONJ風險'],['兒牙/矯正','乳牙、混合齒列、空間、錯咬','齒列分析、頭影測量、生長評估','治療時機與空間管理'],['影像診斷','透亮/不透亮、邊界、牙根/PDL','根尖片、咬翼、全景、CBCT','影像不能脫離臨床診斷']];return `<div class="stage2-subject-block"><div class="stage2-subject-head"><div><h2>${s.name}</h2><p class="muted">${s.focus}</p></div><div class="stage2-kpi"><span class="badge stage2">第二階</span><span class="badge">150臨床內容節點</span><span class="badge">100題</span><span class="badge">下一步決策</span></div></div><div class="stage2-map-row"><div>${dentalVisual(`${s.name}臨床心智圖`,s.core.slice(0,8))}</div><div>${flowSvg('第二階病例決策流程',['主訴','定位','證據','鑑別','診斷','禁忌','處置','追蹤'])}</div></div><h3 style="margin-top:14px">第二階差異表</h3>${richTable(rows,['科目/場景','典型線索','必看檢查','國考判斷'])}<h3 style="margin-top:14px">150 個臨床內容節點</h3><div class="stage2-mini-grid">${ns.map((n,i)=>stage2NodeDetail(s,n,i)).join('')}</div><h3 style="margin-top:18px">100 題第二階國考/病例/處置題</h3><div class="stage2-question-list">${qlist.map((q,i)=>stage2QuestionDetail(s,q,i)).join('')}</div></div>`}
renderStage=function(which){let arr=which===1?subjects.filter(s=>s.stage==='第一階'):subjects.filter(s=>s.stage==='第二階'),el=which===1?stage1:stage2;if(which===1){el.innerHTML=`<div class="section"><div class="head"><div><h1>牙醫第一階國考｜每科150內容節點＋100題</h1><p class="muted">完整展開：口腔解剖胚胎組織、口腔生理與基礎醫學、口腔微生物免疫、口腔病理、牙科藥理與全身醫學、公共衛生倫理法規。</p></div><span class="badge">共${arr.length*150}內容節點＋${arr.length*100}題</span></div><div class="print-band"><h3>第一階核心讀法</h3><p>第一階不是只背名詞，而是把基礎醫學放進口腔顎面世界模型：正常結構 → 生理功能 → 微生物/免疫/病理失衡 → 藥理或公衛處置 → 國考陷阱。</p><div class="tabs"><span class="badge">六大定位</span><span class="badge">正常與失衡</span><span class="badge">檢查證據</span><span class="badge">高槓桿錯題</span></div></div>${arr.map(s=>stage1SubjectDetailed(s)).join('')}</div>`}else{el.innerHTML=`<div class="section"><div class="head"><div><h1>牙醫第二階國考｜每科150內容節點＋100題</h1><p class="muted">完整展開：牙體復形、牙髓根管、牙周、補綴、口腔外科、兒童牙科、齒顎矯正、口腔診斷影像。第二階重點是病例判斷、影像證據、材料/藥物禁忌與下一步處置。</p></div><span class="badge">共${arr.length*150}內容節點＋${arr.length*100}題</span></div><div class="print-band"><h3>第二階核心讀法</h3><p>第二階不是問你記不記得名詞，而是問你能不能在病例中做決策：主訴 → 六大定位 → 檢查證據 → 鑑別診斷 → 全身禁忌 → 臨床處置 → 追蹤。</p><div class="tabs"><span class="badge">病例下一步</span><span class="badge">影像判讀</span><span class="badge">材料與藥物</span><span class="badge">全身風險</span></div></div>${arr.map(s=>stage2SubjectDetailed(s)).join('')}</div>`}}
if(typeof renderStage==='function'){renderStage(1);renderStage(2)}

<script id="mega-exam-bank-script">
function megaExamQuestions(s,n=300){const types=['基礎題','理解題','整合題','病例題','影像題','處置題','陷阱題','鑑別題','材料藥理題','錯題模型題'];return Array.from({length:n},(_,i)=>{const core=s.core[i%s.core.length],d=diseases[(i*3+2)%diseases.length],m=mats[(i*5+4)%mats.length],loc=['牙髓','牙周','顎骨','黏膜','咬合/TMJ','牙材/補綴','神經血管','全身風險'][i%8],type=types[i%types.length];return{no:i+1,type,stem:`${s.stage}${s.name}｜${type}${i+1}：病人出現${d}相關表現，題幹線索包含${core}、${loc}與${m}。下列何者最符合國考要求的判斷或下一步？`,opts:[`先定位在${loc}，用檢查證據連回${core}機制，再決定診斷與處置`,`直接依主訴症狀選擇最侵入性治療，不需補充檢查`,`只背${d}名稱即可，影像、病史與全身用藥不影響答案`,`看到${m}就固定使用，無需考慮禁忌、材料失敗或追蹤`],ans:0,why:`正解是A。國考不是單純問名詞，而是測「位置→功能/正常→失衡→症狀→檢查證據→診斷→治療→追蹤」。本題關鍵是${loc}與${core}。`,wrong:`B太早治療，跳過診斷證據；C把疾病當死背名詞；D忽略${m}的適應症、禁忌與材料/藥理限制。`,avoid:`先畫六格：定位(${loc})、病因、機制(${core})、證據、禁忌、下一步。每題都用這六格排除選項。`,chapter:s.name,disease:d,drug:m,trap:`陷阱是把${d}當成答案本身，而沒有說明為什麼是它、如何證明、下一步要做什麼。`,memory:`口訣：${loc}先定位，${core}接機制，證據決定${d}，禁忌再選${m}。`}})}
function megaQuestionHtml(q){return `<div class="mega-question"><span class="badge">${q.type}</span><span class="badge">題號 ${q.no}</span><h4>${q.stem}</h4><div class="mega-options">${q.opts.map((o,i)=>`<div class="mega-option ${i===q.ans?'answer':''}">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}</div><div class="mega-analysis"><p><b>答案：</b>${String.fromCharCode(65+q.ans)}. ${q.opts[q.ans]}</p><p><b>為什麼：</b>${q.why}</p><p><b>錯在哪：</b>${q.wrong}</p><p><b>如何避免：</b>${q.avoid}</p><p><b>相關章節：</b>${q.chapter}</p><p><b>延伸疾病：</b>${q.disease}</p><p><b>延伸牙材/藥物：</b>${q.drug}</p><p><b>背誦秘訣：</b>${q.memory}</p></div></div>`}
function megaExamPage(s){const q300=megaExamQuestions(s,300);const high=q300.slice(0,60);const rows=[['題型','出題方向','解題動作','最常錯'],['基礎題','名詞與正常結構','先講正常功能','只背名詞'],['理解題','機制與因果','畫正常→失衡','跳過機制'],['整合題','疾病＋影像＋材料','先六大定位','線索混在一起就猜'],['病例題','下一步處置','急症與禁忌優先','過早侵入治療'],['影像題','黑白密度與位置','位置/邊界/牙根/PDL','只看透亮或不透亮'],['材料藥理題','用途、副作用、失敗','適應症＋禁忌','看到藥名就固定使用']];return `<h2>國考重點：大型題庫＋完整解析</h2><div class="print-band"><h3>${s.stage}｜${s.name}</h3><p>本頁直接呈現題庫，不只列重點。每題都附答案、錯誤模型、正確模型、避免方法、延伸疾病與牙材/藥物。</p><div class="tabs"><span class="badge">300題庫</span><span class="badge">完整解析</span><span class="badge">錯題模型</span><span class="badge">背誦口訣</span></div></div><div style="margin-top:14px">${dentalVisual('國考解題核心',['定位','正常','失衡','證據','診斷','處置','禁忌','追蹤'])}</div><h3 style="margin-top:14px">題型總表</h3>${richTable(rows,['分類','內容','怎麼解','陷阱'])}<h3 style="margin-top:14px">最高槓桿60題完整呈現</h3><div class="mega-exam-grid">${high.map(megaQuestionHtml).join('')}</div><details style="margin-top:14px"><summary class="tiny primary">展開本科完整300題題庫與解析</summary><div class="mega-exam-grid" style="margin-top:12px">${q300.map(megaQuestionHtml).join('')}</div></details>`}
function megaWrongBookCard(q,idx){return `<div class="wrongbook-card"><span class="badge">${q.chapter}</span><span class="badge">${q.type} ${q.no}</span><strong>${idx+1}. ${q.stem}</strong><p><b>直接答案：</b>A. ${q.opts[0]}</p><div class="wrong-model"><b>錯誤模型：</b>${q.trap}</div><div class="correct-model"><b>正確模型：</b>${q.why}</div><p><b>為什麼錯：</b>${q.wrong}</p><p><b>如何更新：</b>${q.avoid}</p><p><b>相關疾病：</b>${q.disease}</p><p><b>相關牙材/藥物：</b>${q.drug}</p><p><b>背法：</b>${q.memory}</p></div>`}
function megaWrongBook(){return `<div class="section"><div class="head"><div><h1>國考錯題本｜最大資料增建</h1><p class="muted">按科目完整展開。每科300個高槓桿錯題解析節點，包含錯誤模型、正確模型、為什麼錯、如何避免、相關疾病與牙材/藥物。</p></div><span class="badge">${subjects.length*300}錯題解析節點</span></div><div class="print-band"><h3>錯題本不是記答案</h3><p>每一題都要從「錯誤模型」更新成「正確模型」：定位錯、機制錯、證據錯、禁忌錯、下一步錯，全部要被明確標出。</p></div>${subjects.map(s=>{const q=megaExamQuestions(s,300);return `<div class="wrongbook-subject"><div class="stage2-subject-head"><div><h2>${s.stage}｜${s.name}</h2><p class="muted">${s.focus}</p></div><div class="wrongbook-kpis"><span class="badge">300題</span><span class="badge">錯誤模型</span><span class="badge">正確模型</span><span class="badge">更新方法</span></div></div>${dentalVisual(`${s.name}錯題心智圖`,['定位錯','機制錯','證據錯','診斷錯','禁忌錯','處置錯','追蹤錯','背法錯'])}<div class="wrongbook-list">${q.map((item,i)=>megaWrongBookCard(item,i)).join('')}</div></div>`}).join('')}</div>`}
const previousPageHtmlForMega=pageHtml;
pageHtml=function(s,i){if(i===10)return megaExamPage(s);return previousPageHtmlForMega(s,i)};
renderWrong=function(){wrong.innerHTML=megaWrongBook()};
if(typeof renderSubject==='function')renderSubject();
if(typeof renderWrong==='function')renderWrong();

 ['occlusion','咬合','上下牙接觸關係，補綴與矯正都會考'],['periodontitis','牙周炎','牙周支持組織發炎與破壞'],['gingivitis','牙齦炎','局限於牙齦的可逆性發炎'],['pulpitis','牙髓炎','牙髓組織發炎，需分可逆與不可逆'],['caries','齲齒','牙菌斑酸造成硬組織脫礦'],['composite resin','複合樹脂','常用直接復形材料'],['glass ionomer cement','玻璃離子體水門汀','可釋放氟，對濕度較耐受'],['endodontics','牙髓病學/根管治療','處理牙髓與根尖周圍疾病'],['prosthodontics','補綴學','固定、活動、全口與植牙補綴'],['orthodontics','齒顎矯正學','處理咬合與齒列排列'],['periodontal ligament','牙周膜','牙根與齒槽骨之間的支持組織'],['alveolar bone','齒槽骨','支持牙齒的顎骨部分'],['lamina dura','硬骨板','X光上牙槽窩周圍白線'],['radiolucency','放射線透亮','影像較黑，常見骨質流失或病灶'],['radiopacity','放射線不透亮','影像較白，可能為硬組織或鈣化'],['periapical','根尖周圍','牙根尖周邊區域'],['furcation','根分叉','多根牙根分叉區'],['mobility','牙齒動搖度','牙周支持喪失或外傷咬合可造成'],['biopsy','切片檢查','黏膜或病灶診斷的重要證據'],['debridement','清創','移除感染、壞死或污染組織'],['pulpotomy','牙髓切斷術','常見於兒牙活髓治療'],['pulpectomy','牙髓摘除術','移除全部牙髓組織'],['apicoectomy','根尖切除術','外科根尖處置'],['osseointegration','骨整合','植體與骨直接結合'],['impression','印模','取得口腔形態供補綴製作'],['abutment','支台齒/支台','承受補綴或植體結構'],['pontic','橋體','固定牙橋中取代缺牙的部分'],['margin','邊緣','補綴邊緣密合度是考點'],['microleakage','微滲漏','復形邊緣滲漏造成敏感或二次齲'],['polymerization shrinkage','聚合收縮','樹脂固化收縮造成應力或縫隙'],['working length','工作長度','根管治療清創充填長度'],['gutta-percha','馬來膠','根管充填材料'],['sodium hypochlorite','次氯酸鈉','根管沖洗液'],['chlorhexidine','氯己定','抗菌漱口或消毒藥物'],['lidocaine','利多卡因','常用局部麻醉藥'],['articaine','阿替卡因','牙科常用局麻藥'],['epinephrine','腎上腺素','局麻血管收縮劑'],['ibuprofen','布洛芬','NSAID止痛消炎藥'],['acetaminophen','乙醯胺酚','止痛退燒，非NSAID'],['amoxicillin','阿莫西林','牙科感染常用抗生素'],['metronidazole','甲硝唑','厭氧菌感染常用'],['clindamycin','克林黴素','青黴素過敏替代但注意C. difficile'],['bisphosphonate','雙磷酸鹽','與MRONJ風險相關'],['warfarin','華法林','抗凝血藥，需注意INR'],['midazolam','咪達唑侖','鎮靜用藥']

 CBCT:'錐狀束電腦斷層',PDL:'牙周膜',CAL:'臨床附連喪失',PPD:'牙周囊袋深度',BOP:'探診出血',SRP:'洗牙與牙根整平',EPT:'電活髓測試',NaOCl:'次氯酸鈉',EDTA:'乙二胺四乙酸',GIC:'玻璃離子體水門汀',RMGIC:'樹脂改良玻璃離子體水門汀',RPD:'局部活動義齒',SCC:'鱗狀細胞癌',MRONJ:'藥物相關顎骨壞死',TMJ:'顳顎關節',TMD:'顳顎障礙',IAN:'下齒槽神經',LA:'局部麻醉',NSAID:'非類固醇消炎止痛藥',DOAC:'直接口服抗凝血劑',INR:'國際標準化凝血比值',DM:'糖尿病',HTN:'高血壓',IE:'感染性心內膜炎',IAND:'切開引流',MTA:'三氧礦物聚合物',ZOE:'氧化鋅丁香油',PVS:'聚乙烯矽氧烷印模材',SSC:'不鏽鋼牙冠'
});
function speakDental(text){if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(String(text)); u.lang='en-US'; u.rate=.82; speechSynthesis.speak(u)}
function termChip(en,zh,note,abbrMode=false){return `<span class="term-chip ${abbrMode?'abbr-chip':''}" title="${note||zh}"><button class="speak-mini" onclick="speakDental('${String(en).replace(/'/g,'')}')">▶</button><span>${en}</span><span>｜${zh}</span></span>`}
function glossaryPanel(limit=45){const terms=dentalTermsBilingual.slice(0,limit).map(t=>termChip(t[0],t[1],t[2])).join('');const ab=Object.entries(dentalAbbrevBilingual).map(([k,v])=>termChip(k,v,'英文縮寫中文解析',true)).join('');return `<div class="global-glossary"><h3>英文專業名詞雙語＋縮寫中文解析＋發音</h3><div>${terms}</div><h3 style="margin-top:12px">常考縮寫</h3><div>${ab}</div><p class="bilingual-note">使用方式：按 ▶ 發英文音。題庫、錯題、影像、牙材頁面中的英文縮寫也會集中整理在這裡。</p></div>`}
function renderBilingualDock(){let dock=document.getElementById('bilingualDock'); if(!dock){dock=document.createElement('div');dock.id='bilingualDock';dock.className='bilingual-dock';document.body.appendChild(dock)}dock.innerHTML=`<div class="bilingual-head"><strong>牙科英文雙語發音</strong><button class="tiny" onclick="document.getElementById('bilingualDock').classList.toggle('collapsed')">收合/展開</button></div><div class="bilingual-body"><table class="bilingual-table"><tbody>${dentalTermsBilingual.slice(0,18).map(t=>`<tr><td><button class="speak-mini" onclick="speakDental('${t[0].replace(/'/g,'')}')">▶</button> <b>${t[0]}</b></td><td>${t[1]}<br><span class="muted">${t[2]}</span></td></tr>`).join('')}${Object.entries(dentalAbbrevBilingual).slice(0,18).map(([k,v])=>`<tr><td><button class="speak-mini" onclick="speakDental('${k}')">▶</button> <b>${k}</b></td><td>${v}<br><span class="muted">縮寫中文解析</span></td></tr>`).join('')}</tbody></table></div>`}
function attachGlossaryToSections(){['home','roadmap','stage1','stage2','subject','cases','images','materials','english','wrong'].forEach(id=>{const el=document.getElementById(id); if(el && !el.querySelector('.global-glossary')){const box=document.createElement('div');box.className='section';box.innerHTML=glossaryPanel(id==='english'?999:35);el.appendChild(box)}})}
const oldRichEnglishForBilingual=typeof richEnglish==='function'?richEnglish:null;
richEnglish=function(){return `<h2>牙科英文：雙語、縮寫中文解析、英文發音</h2>${glossaryPanel(999)}<div class="section"><h3>每日朗讀句</h3><div class="flow">${['Evaluate occlusion before prosthodontic treatment. 評估補綴前先檢查咬合。','A periapical radiolucency may suggest apical periodontitis. 根尖透亮可能暗示根尖周炎。','Periodontal probing depth and bleeding on probing guide diagnosis. 牙周囊袋深度與探診出血可協助診斷。','CBCT helps evaluate impacted third molars and the inferior alveolar nerve. CBCT可評估阻生智齒與下齒槽神經。','Composite resin failure may result from microleakage or polymerization shrinkage. 複合樹脂失敗可能來自微滲漏或聚合收縮。'].map((s,i)=>`<div class="step"><span class="num">${i+1}</span><div>${s}<br><button class="tiny" onclick="speakDental('${s.split('。')[0].replace(/'/g,'')}')">▶ 朗讀英文句</button></div></div>`).join('')}</div></div>`}
const oldRenderEnglishBilingual=typeof renderEnglish==='function'?renderEnglish:null;
renderEnglish=function(){english.innerHTML=`<div class="section">${richEnglish()}</div>`}
const oldRenderSubjectBilingual=typeof renderSubject==='function'?renderSubject:null;
renderSubject=function(){oldRenderSubjectBilingual(); attachGlossaryToSections(); renderBilingualDock()}
const oldNavToBilingual=typeof navTo==='function'?navTo:null;
navTo=function(id){oldNavToBilingual(id); setTimeout(()=>{attachGlossaryToSections();renderBilingualDock()},0)}
if(typeof renderEnglish==='function')renderEnglish();attachGlossaryToSections();renderBilingualDock();
</script><style id="stage-mindmap-style">
.stage-dashboard{display:grid;gap:18px}.mega-mindmap-wrap{border:1px solid var(--line);border-radius:var(--r);background:#fff;padding:14px;overflow:auto}.mega-mindmap-wrap svg{min-width:980px;width:100%;height:auto}.diff-board{display:grid;grid-template-columns:1fr 1fr;gap:14px}.diff-col{border:1px solid var(--line);border-radius:var(--r);background:#fff;padding:14px}.diff-col.stage-one{border-top:5px solid #2563eb}.diff-col.stage-two{border-top:5px solid #0f8b8d}.mega-focus-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.mega-focus-card{border:1px solid var(--line);border-radius:var(--r);background:#f8fafc;padding:12px}.mega-focus-card strong{display:block;margin-bottom:7px}.focus-mind{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.focus-mind span{background:#fff;border:1px solid #d8dee8;border-radius:8px;padding:7px;font-size:12px;font-weight:900;text-align:center}.stage-summary-flow{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}.stage-summary-flow span{display:grid;place-items:center;min-height:54px;background:#e7f7f6;border:1px solid #bfe5e3;border-radius:var(--r);font-weight:900;text-align:center;padding:8px}@media(max-width:1000px){.diff-board,.mega-focus-grid{grid-template-columns:1fr}.stage-summary-flow{grid-template-columns:1fr 1fr}}

<script id="stage-mindmap-script">
function stageMegaMindmap(title, arr, centerColor){const w=1080,h=720,cx=540,cy=350;return `<div class="mega-mindmap-wrap"><svg viewBox="0 0 ${w} ${h}"><defs><marker id="mindarr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#8da2bb"/></marker></defs><rect width="${w}" height="${h}" fill="#fff"/><circle cx="${cx}" cy="${cy}" r="72" fill="${centerColor}"/><text x="${cx}" y="${cy-6}" text-anchor="middle" fill="white" font-size="24" font-weight="900">${title}</text><text x="${cx}" y="${cy+24}" text-anchor="middle" fill="#e7f7f6" font-size="15">國考世界模型</text>${arr.map((s,i)=>{const a=-Math.PI/2+i*Math.PI*2/arr.length,rx=cx+355*Math.cos(a),ry=cy+245*Math.sin(a),core=s.core.slice(0,5);return `<line x1="${cx}" y1="${cy}" x2="${rx}" y2="${ry}" stroke="#8da2bb" stroke-width="2" marker-end="url(#mindarr)"/><rect x="${rx-118}" y="${ry-48}" width="236" height="96" rx="10" fill="${i%2?'#eef6ff':'#e7f7f6'}" stroke="#cfe2ff"/><text x="${rx}" y="${ry-22}" text-anchor="middle" font-size="17" font-weight="900">${s.name}</text>${core.map((x,k)=>`<text x="${rx}" y="${ry+2+k*16}" text-anchor="middle" font-size="12" fill="#344054">${x}</text>`).join('')}`}).join('')}</svg></div>`}
function stageFocusCards(arr,stageLabel){return `<div class="mega-focus-grid">${arr.map((s,idx)=>{const ns=nodes(s,18,stageLabel);return `<div class="mega-focus-card"><span class="badge">${stageLabel}</span><strong>${s.name}</strong><p>${s.focus}</p><div class="focus-mind">${s.core.slice(0,10).map(x=>`<span>${x}</span>`).join('')}</div><h3 style="margin-top:10px">最大量重點整理</h3>${ns.slice(0,10).map((n,i)=>`<p><b>${i+1}. ${n.core}</b>：${n.map}</p>`).join('')}<button class="tiny primary" onclick="sid='${s.id}';page=10;renderSubject();navTo('subject')">看本科題庫解析</button></div>`}).join('')}</div>`}
function stageDiffDiagram(){const rows=[['考試目的','確認基礎醫學與口腔基礎是否能解釋正常/失衡','確認臨床牙科能否診斷、處置、追蹤'],['核心問題','為什麼會發生？機制是什麼？','下一步要做什麼？禁忌是什麼？'],['主要內容','解剖、胚胎、組織、生理、微免、病理、藥理、公衛','復形、根管、牙周、補綴、口外、兒牙、矯正、影像'],['解題起手式','正常結構 → 功能 → 失衡 → 檢查','主訴 → 定位 → 證據 → 鑑別 → 處置'],['最常錯','背名詞但說不出機制','太早治療，忽略影像、病史、禁忌'],['最好背法','把每科畫成正常到疾病的因果圖','把每題寫成下一步決策流程']];return `<div class="diff-board"><div class="diff-col stage-one"><h2>第一階心智模型</h2>${flowSvg('第一階：基礎到失衡',['正常','功能','病因','機制','症狀','檢查','考點','陷阱'])}${memoryBlock(['正常結構','生理功能','微生物免疫','病理失衡','藥理公衛'])}</div><div class="diff-col stage-two"><h2>第二階心智模型</h2>${flowSvg('第二階：病例到處置',['主訴','定位','證據','鑑別','診斷','禁忌','治療','追蹤'])}${memoryBlock(['病例線索','影像證據','臨床處置','全身禁忌','追蹤維持'])}</div></div><h3 style="margin-top:14px">第一階 vs 第二階差異圖</h3>${richTable(rows,['比較','第一階','第二階'])}`}
function stage1MindmapDashboard(){const arr=subjects.filter(s=>s.stage==='第一階');return `<div class="section"><div class="head"><div><h1>牙醫第一階國考｜心智圖總整理</h1><p class="muted">第一階用「正常結構 → 生理功能 → 微生物/免疫/病理失衡 → 藥理/公衛 → 國考陷阱」來讀。</p></div><span class="badge">心智圖＋差異圖＋最大量重點</span></div><div class="stage-summary-flow"><span>正常結構</span><span>功能</span><span>病因</span><span>機制</span><span>檢查</span><span>考點</span></div>${stageMegaMindmap('第一階',arr,'#2563eb')}<h2 style="margin-top:16px">第一階各科最大量重點心智整理</h2>${stageFocusCards(arr,'第一階')}</div>`}
function stage2MindmapDashboard(){const arr=subjects.filter(s=>s.stage==='第二階');return `<div class="section"><div class="head"><div><h1>牙醫第二階國考｜心智圖總整理</h1><p class="muted">第二階用「主訴 → 六大定位 → 檢查證據 → 鑑別診斷 → 禁忌 → 臨床處置 → 追蹤」來讀。</p></div><span class="badge">心智圖＋差異圖＋最大量重點</span></div><div class="stage-summary-flow"><span>主訴</span><span>定位</span><span>證據</span><span>診斷</span><span>處置</span><span>追蹤</span></div>${stageMegaMindmap('第二階',arr,'#0f8b8d')}<h2 style="margin-top:16px">第二階各科最大量重點心智整理</h2>${stageFocusCards(arr,'第二階')}</div>`}
const previousRenderRoadmapMind=typeof renderRoadmap==='function'?renderRoadmap:null;
renderRoadmap=function(){roadmap.innerHTML=`<div class="section"><div class="head"><div><h1>牙醫國考總架構｜第一階 vs 第二階</h1><p class="muted">用差異圖先分清楚：第一階問基礎機制，第二階問臨床下一步。</p></div><span class="badge">差異圖</span></div>${stageDiffDiagram()}</div>`}
const oldRenderStageMind=typeof renderStage==='function'?renderStage:null;
renderStage=function(which){oldRenderStageMind(which);if(which===1){stage1.insertAdjacentHTML('afterbegin',stage1MindmapDashboard())}else{stage2.insertAdjacentHTML('afterbegin',stage2MindmapDashboard())}}
if(typeof renderRoadmap==='function')renderRoadmap();if(typeof renderStage==='function'){renderStage(1);renderStage(2)}
</script></body></html>
